# Red-team eBPF audit and integrity validation.
# This workflow intentionally triggers sensitive events (BPF map access, 
# network probes, etc.) and asserts that Coldstep captures them with 
# high integrity.
#
# Anti-blindness gating: fails if integrity score is zero (mandatory canaries missing).

name: coldstep-redteam-ebpf

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      fail_on_blindness:
        description: Fail the job if telemetry integrity/canaries are missing
        type: boolean
        default: true

env:
  COLDSTEP_AGENT_VERSION: v0.2.0

jobs:
  audit-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      NS_RUNNER_LABEL: ubuntu-latest-redteam
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build coldstep agent
        run: |
          bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
          mv bin/coldstep bin/coldstep-built
          chmod +x bin/coldstep-built
          # For release-path compatibility in next step
          cp bin/coldstep-built bin/coldstep

      - name: Start Coldstep (detect mode with full audit gates)
        uses: ./
        with:
          phase: start
          mode: detect
          log-level: info
          report-job-summary: 'false'
          allowed-hosts: theclouddj.com, *.ubuntu.com
          feature-gates: proc_tree=1,tls_sni=1,fs_events=1
          release-path: bin/coldstep

      - name: Install runtime tools
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nmap dnsutils linux-tools-common linux-tools-generic linux-tools-azure

      - name: Red-team probes (Generate Telemetry)
        run: |
          set -euo pipefail
          
          echo "--- EXEC CANARY ---"
          # Standard exec activity
          ls /etc/passwd >/dev/null
          # Integrity canary: JSONL exec events must match predicate comm=bash.
          bash -c 'echo "redteam-bash-canary" >/dev/null'
          
          echo "--- UDP/DNS CANARY ---"
          # Trigger the DNS canary (8.8.8.8)
          dig @8.8.8.8 google.com +short >/dev/null || true
          
          echo "--- BPF AUDIT PROBE ---"
          # Trigger BPF audit events (if supported by runner kernel)
          sudo bpftool map show >/dev/null 2>&1 || echo "bpftool map show failed; best effort audit signal"
          sudo bpftool prog show >/dev/null 2>&1 || echo "bpftool prog show failed; best effort audit signal"
          
          echo "--- NETWORK EGRESS PROBE (TLS) ---"
          # TLS connect (SNI: theclouddj.com); -4 so agent records IPv4 TLS (JSONL filters non-IPv4).
          for _ in 1 2 3; do
            curl -4 --http1.1 -s -I --max-time 8 https://theclouddj.com >/dev/null && break || true
            sleep 1
          done
          
          echo "--- FS EVENT PROBE ---"
          # Filesystem events
          TMP_F=$(mktemp)
          echo "redteam" > "${TMP_F}"
          chmod 400 "${TMP_F}"
          rm "${TMP_F}"

          # Give ring readers time to drain telemetry before stop.
          sleep 2
      - name: Stop Coldstep (flush digest)
        uses: ./
        with:
          phase: stop
          report-job-summary: 'false'
          fail-on-error: 'false'

      - name: Build report model
        env:
          COLDSTEP_REPORT_CURRENT_JSONL: ${{ github.workspace }}/.coldstep-events.jsonl
          COLDSTEP_REPORT_MODEL_OUT: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report build-model

      - name: Enforce Anti-Blindness Gating
        if: github.event_name != 'workflow_dispatch' || inputs.fail_on_blindness == true
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report assert-integrity

      - name: Render step summary
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report render-summary

      - name: Render HTML report
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_REPORT_HTML_OUT: ${{ github.workspace }}/coldstep-redteam-report.html
        run: ./bin/coldstep-report render-html

      - name: Upload Redteam Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coldstep-redteam-report
          path: ${{ github.workspace }}/coldstep-redteam-report.html
          retention-days: 7
          overwrite: true
