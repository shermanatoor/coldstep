# Expensive / deep checks — nightly cron + manual on-demand only (not on every PR).
# Keeps PR CI fast; surfaces govulncheck, ordering stress (-shuffle), optional full-module race.

name: coldstep-ci nightly

on:
  schedule:
    # ~08:42 UTC daily (avoid exact hour boundaries used by many cron jobs)
    - cron: '42 8 * * *'
  workflow_dispatch:
    inputs:
      run_govulncheck:
        description: Run govulncheck vulnerability scan (module graph)
        type: boolean
        default: true
      run_shuffle_test:
        description: Run go test -shuffle (detect ordering-dependent tests)
        type: boolean
        default: true
      run_full_race:
        description: Run go test -race on entire module (slow; use sparingly)
        type: boolean
        default: false
      run_integration_sudo:
        description: Run sudo BPF integration tests via scripts/deep-debug.sh (slow; may fail on some runners)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  govulncheck:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF and generated Go (same graph as PR unit job)
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Install govulncheck
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Govulncheck
        env:
          GOTOOLCHAIN: auto
        run: govulncheck ./...

  go-test-shuffle:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_shuffle_test)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF and generated Go
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Unit tests with shuffle (stress test execution order)
        env:
          GOTOOLCHAIN: auto
        run: go test ./... -count=1 -shuffle=on -timeout 20m

  go-test-race-full:
    # Only manual — full-module race is far slower than scoped agent race on PR CI.
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_race
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF and generated Go
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Race detector — full module
        env:
          GOTOOLCHAIN: auto
        run: go test -race -count=1 ./... -timeout 45m

  sudo-integration:
    # Manual only — requires sudo; may fail on some hosted runners.
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_sudo
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run sudo BPF integration (deep-debug.sh)
        env:
          DEEP_DEBUG_CI: '1'
          DEEP_DEBUG_RUN_3B: '0'
          DEEP_DEBUG_RUN_4: '1'
          DEEP_DEBUG_GOVULNCHECK: '0'
          DEEP_DEBUG_SHUFFLE: '0'
          DEEP_DEBUG_RACE_FULL: '0'
        run: bash scripts/deep-debug.sh

      - name: Upload deep-debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coldstep-deep-debug-${{ github.run_id }}
          path: .coldstep-deep-debug/
          if-no-files-found: warn
