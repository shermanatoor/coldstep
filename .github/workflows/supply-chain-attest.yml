# Builds and attests release-grade artifacts: Go agent/action binaries, composite action bundle,
# and CycloneDX SBOMs. Triggers on version tags and manual dispatch.
name: supply-chain-attest

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: supply-chain-attest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  attest:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build Go agent (BPF + binary)
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"

      - name: Create composite action bundle archive
        run: |
          set -euo pipefail
          test -f action.yml
          test -x bin/coldstep
          test -x bin/coldstep-action
          test -x bin/coldstep-report
          tar -czf coldstep-action-bundle.tar.gz \
            action.yml bin/coldstep bin/coldstep-action bin/coldstep-report scripts/build-agent-linux.sh \
            scripts/coldstep_bootstrap/README.md \
            scripts/coldstep_bootstrap/allowlist-domains-v1.txt \
            scripts/coldstep_bootstrap/allowlist-ips-v1.txt

      - name: Install Syft (pinned)
        env:
          SYFT_VERSION: '1.18.0'
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/syft.deb \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/syft.deb
          syft version

      - name: Generate SBOMs (CycloneDX JSON)
        run: |
          set -euo pipefail
          syft scan "file:${GITHUB_WORKSPACE}/go.mod" \
            -o "cyclonedx-json=${GITHUB_WORKSPACE}/sbom-go.cdx.json"
          syft scan "file:${GITHUB_WORKSPACE}/coldstep-action-bundle.tar.gz" \
            -o "cyclonedx-json=${GITHUB_WORKSPACE}/sbom-action.cdx.json"
          ls -la sbom-go.cdx.json sbom-action.cdx.json

      - name: Attest — build provenance (Go binary)
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/bin/coldstep'

      - name: Attest — build provenance (action bundle tarball)
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/coldstep-action-bundle.tar.gz'

      - name: Attest — SBOM for Go binary subject
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/bin/coldstep'
          sbom-path: '${{ github.workspace }}/sbom-go.cdx.json'

      - name: Attest — SBOM for action bundle subject
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/coldstep-action-bundle.tar.gz'
          sbom-path: '${{ github.workspace }}/sbom-action.cdx.json'

      # One published binary per tag; demo workflows download this instead of compiling on every run.
      # Immutable releases may reject uploads: fail if coldstep-linux-amd64 is still missing (otherwise demos see "no assets to download").
      - name: Upload Linux agent to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cp bin/coldstep coldstep-linux-amd64
          chmod +x coldstep-linux-amd64
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            rc=0
            out="$(gh release upload "${tag}" coldstep-linux-amd64 --repo "${GITHUB_REPOSITORY}" --clobber 2>&1)" || rc=$?
            if [[ "$rc" -ne 0 ]]; then
              if echo "$out" | grep -qiE 'immutable release|Cannot upload assets'; then
                has_bin="$(gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '[.assets[].name] | any(. == "coldstep-linux-amd64")' 2>/dev/null || echo false)"
                if [[ "${has_bin}" != "true" ]]; then
                  echo "::error title=Missing coldstep-linux-amd64::Release ${tag} rejected uploads and has no coldstep-linux-amd64 asset. Delete or fix the empty/immutable release, or attach bin/coldstep as coldstep-linux-amd64 from the supply-chain-artifacts artifact, then re-run this workflow on the tag."
                  exit 1
                fi
                echo "::warning title=Skipped release binary re-upload::Release ${tag} rejected upload; coldstep-linux-amd64 already present."
                exit 0
              fi
              echo "$out" >&2
              exit "$rc"
            fi
          else
            gh release create "${tag}" coldstep-linux-amd64 \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --notes "Linux amd64 eBPF agent (ubuntu-latest). Composite action and SBOMs: see repository and workflow artifacts."
          fi

      - name: Upload attestable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-artifacts-${{ github.run_id }}
          path: |
            bin/coldstep
            coldstep-action-bundle.tar.gz
            sbom-go.cdx.json
            sbom-action.cdx.json
          if-no-files-found: error
