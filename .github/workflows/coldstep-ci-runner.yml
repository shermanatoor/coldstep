# Reusable CI + Coldstep detect/enforce. Agent/BPF build + unit tests + integration run on **ubuntu-latest** /
# **ubuntu-22.04** (x64) and **ubuntu-24.04-arm** / **ubuntu-22.04-arm** (arm64). Detect/enforce stay on ubuntu-latest.

name: coldstep-ci runner

on:
  workflow_call:
    inputs:
      coldstep_diff_strict:
        description: When true, detect-mode fails if previous-run JSONL diff cannot be computed
        type: boolean
        default: true
      defend_deny_jsonl_strict:
        description: When true, defend-mode fails if no deny JSONL rows appear after defend smoke (stricter than default variance-tolerant path)
        type: boolean
        default: false

# Default to least-privilege for every job in this reusable workflow.
# Jobs that legitimately need more (e.g. `actions: read` to download a
# previous-run baseline artifact for JSONL diff) override this block at the
# job level — see `coldstep-demo-detect.yml` for the same pattern.
permissions:
  contents: read

jobs:
  # Authoritative gofmt on hosted Linux (same Go toolchain pin as unit/integration jobs).
  gofmt:
    name: Go format
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - name: AGENTS.md must not be tracked
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch AGENTS.md >/dev/null 2>&1; then
            echo "::error::AGENTS.md is listed in the git index. It must remain gitignored and local-only; remove with git rm --cached AGENTS.md and drop any commit that adds it."
            exit 1
          fi
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: gofmt check
        run: bash scripts/check-gofmt.sh
      - name: encoding check
        run: bash scripts/check-encoding.sh

  action_manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

  unit:
    name: unit (${{ matrix.os }})
    needs: [gofmt]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF and generated Go
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Go vet
        run: go vet ./...
      - name: staticcheck
        env:
          GOTOOLCHAIN: auto
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          staticcheck ./...
      - name: Unit tests
        run: go test ./... -count=1
      - name: Race detector (Go agent)
        run: go test -race -count=1 ./internal/agent/... -timeout 15m

  unit-arm64:
    name: unit-arm64 (${{ matrix.os }})
    needs: [gofmt]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF and generated Go
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Go vet
        run: go vet ./...
      - name: staticcheck
        env:
          GOTOOLCHAIN: auto
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          staticcheck ./...
      - name: Unit tests
        run: go test ./... -count=1
      - name: Race detector (Go agent)
        run: go test -race -count=1 ./internal/agent/... -timeout 15m

  integration:
    name: integration (${{ matrix.os }})
    needs: [gofmt]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Prepare BPF
        run: bash scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
      - name: Go vet
        run: go vet ./...
      - name: staticcheck
        env:
          GOTOOLCHAIN: auto
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          staticcheck ./...
      - name: Integration tests (root)
        run: sudo env "PATH=$PATH" go test -tags=integration ./internal/agent/... -count=1 -parallel 1

  action_bundle:
    needs: [gofmt]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Build action binaries
        run: bash scripts/build-agent-linux.sh "${GITHUB_WORKSPACE}"
      - name: Verify action binaries exist
        run: |
          set -euo pipefail
          test -x bin/coldstep
          test -x bin/coldstep-action
          test -x bin/coldstep-report

  detect-mode:
    needs: [gofmt]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      COLDSTEP_DIFF_PREV_RUN: '1'
      COLDSTEP_DIFF_STRICT: ${{ inputs.coldstep_diff_strict == true && '1' || '0' }}
      NS_RUNNER_LABEL: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Start Coldstep (detect mode)
        uses: ./
        with:
          phase: start
          mode: detect
          detect-profile: enhanced
          allowed-hosts: theclouddj.com, *.ubuntu.com

      - name: Install runtime probes
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nmap dnsutils netcat-openbsd curl linux-tools-common linux-tools-generic linux-tools-azure

      - name: Assert required tools are present
        run: |
          set -euo pipefail
          command -v dig
          command -v nc
          command -v nmap
          command -v curl

      - name: Capability probes (detect mode)
        run: |
          set -euo pipefail
          nmap -4 -Pn -p 80 --max-retries 1 --host-timeout 60s theclouddj.com
          curl -4 -fsS --max-time 20 --connect-timeout 8 http://theclouddj.com/ >/dev/null || true
          curl -4 --http1.1 -fsS --max-time 20 --connect-timeout 8 https://theclouddj.com/ >/dev/null || true
          timeout 10 bash -c 'printf "x" >/dev/udp/8.8.8.8/53' 2>/dev/null || true
          bash -c 'echo "coldstep-demo" >/dev/null'
          # BPF Audit (if supported)
          sudo bpftool map show >/dev/null 2>&1 || true
          TMP_FS_DIR="$(mktemp -d /tmp/coldstep-nmap-demo-XXXXXX)"
          TMP_A="${TMP_FS_DIR}/a.txt"
          TMP_B="${TMP_FS_DIR}/b.txt"
          printf 'demo\n' > "${TMP_A}"
          mv "${TMP_A}" "${TMP_B}"
          chmod 600 "${TMP_B}"
          rm -f "${TMP_B}" || true
          rmdir "${TMP_FS_DIR}" || true

      - name: Stop Coldstep (flush digest to workspace)
        uses: ./
        with:
          phase: stop
          report-job-summary: 'false'
          fail-on-error: 'false'

      - name: Build report model
        env:
          COLDSTEP_REPORT_CURRENT_JSONL: ${{ github.workspace }}/.coldstep-events.jsonl
          COLDSTEP_REPORT_MODEL_OUT: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_DETECT_PROFILE: enhanced
        run: ./bin/coldstep-report build-model

      - name: Enforce Anti-Blindness Gating
        if: github.event_name != 'workflow_dispatch' || inputs.coldstep_diff_strict == true
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report assert-integrity



      - name: Compare detect output with previous successful run (opt-in)
        if: env.COLDSTEP_DIFF_PREV_RUN == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          summary="${GITHUB_STEP_SUMMARY}"
          current_file="${GITHUB_WORKSPACE}/.coldstep-events.jsonl"
          marker_prefix="coldstep-prev-diff"
          fail_diff_unavailable() {
            local reason="$1"
            echo "- ${marker_prefix}.result=unavailable (${reason})" >> "${summary}"
            if [[ "${COLDSTEP_DIFF_STRICT:-0}" == "1" ]]; then
              echo "::error::${reason}"
              exit 1
            fi
            exit 0
          }

          if [[ ! -f "${current_file}" ]]; then
            fail_diff_unavailable "current JSONL missing"
          fi
          
          current_run="${GITHUB_RUN_ID}"
          # pull_request uses GITHUB_REF_NAME like "21/merge"; use the head branch so gh finds prior runs.
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          # This job lives in a reusable workflow; runs are indexed under the entry workflow (coldstep-ci.yml), not
          # coldstep-ci-runner.yml — listing by the callee filename returns no rows and breaks baseline diff.
          entry_workflow="coldstep-ci.yml"
          baseline_run="$(
            gh run list --workflow "${entry_workflow}" --branch "${branch}" --status success --limit 30 --json databaseId \
              --jq '[.[] | select((.databaseId|tostring) != "'"${current_run}"'")] | first | if . == null then empty else .databaseId|tostring end'
          )"
          fallback_used="false"
          
          if [[ -z "${baseline_run}" ]]; then
            baseline_run="$(
              gh run list --branch "${branch}" --status success --limit 30 --json databaseId \
                --jq '[.[] | select((.databaseId|tostring) != "'"${current_run}"'")] | first | if . == null then empty else .databaseId|tostring end'
            )"
            fallback_used="any-workflow-on-branch"
          fi
          
          if [[ -z "${baseline_run}" ]]; then
            baseline_run="$(
              gh run list --workflow "${entry_workflow}" --branch main --status success --limit 30 --json databaseId \
                --jq '[.[] | select((.databaseId|tostring) != "'"${current_run}"'")] | first | if . == null then empty else .databaseId|tostring end'
            )"
            fallback_used="main-branch"
          fi
          
          if [[ -z "${baseline_run}" ]]; then
            echo "- ${marker_prefix}.fallback_used=${fallback_used}" >> "${summary}"
            fail_diff_unavailable "no prior successful run found"
          fi

          echo "::notice::coldstep-prev-diff baseline_run=${baseline_run} fallback_used=${fallback_used}"

          rm -rf prev-state
          mkdir -p prev-state
          baseline_artifact="coldstep-events-baseline-${NS_RUNNER_LABEL}"
          if ! gh run download "${baseline_run}" --name "${baseline_artifact}" --dir prev-state >/dev/null 2>&1; then
            fail_diff_unavailable "baseline artifact missing for run ${baseline_run}"
          fi
          
          baseline_file="prev-state/.coldstep-events.jsonl"
          if [[ ! -f "${baseline_file}" ]]; then
            fail_diff_unavailable "downloaded artifact missing .coldstep-events.jsonl"
          fi

          if ! ./bin/coldstep-report diff --summary "${summary}" --baseline "${baseline_file}" --current "${current_file}" --marker "${marker_prefix}"; then
            fail_diff_unavailable "coldstep-report diff failed"
          fi

          # Re-build the report model now that the baseline JSONL is on disk.
          ./bin/coldstep-report build-model --current "${current_file}" --baseline "${baseline_file}" --out "${GITHUB_WORKSPACE}/.coldstep-report-model.json"

      - name: Enrich report model with reverse DNS
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_RDNS_WALL_BUDGET_MS: '5000'
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report rdns-enrich --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping rDNS enrichment"
          fi

      - name: Enrich report model with OTX threat-intel
        if: always()
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_OTX_WALL_BUDGET_MS: '30000'
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report otx-enrich --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping OTX enrichment"
          fi

      - name: Render IP classification summary
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report render-ip-summary --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping IP classification summary"
          fi

      - name: Render detect summary
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report render-summary
      - name: Persist detect JSONL baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coldstep-events-baseline-ubuntu-latest
          path: ${{ github.workspace }}/.coldstep-events.jsonl
          retention-days: 14
          include-hidden-files: true
          overwrite: true

      - name: List workspace Coldstep artifacts
        if: always()
        run: |
          set -euo pipefail
          ls -la "${GITHUB_WORKSPACE}"/.coldstep-detect.md "${GITHUB_WORKSPACE}"/.coldstep-events.jsonl 2>/dev/null || true

  defend-mode:
    needs: [gofmt]
    runs-on: ubuntu-latest
    # Enforce-mode first load can sit in the BPF verifier for 20+ minutes on busy runners; keep headroom past fail-on-error wait.
    timeout-minutes: 45
    env:
      COLDSTEP_DEFEND_DENY_JSONL_STRICT: ${{ inputs.defend_deny_jsonl_strict && '1' || '0' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      # Cache skips clang+bpf rebuild when sources unchanged — composite uses release-path so startup
      # stays fast under fail-on-error (BPF verifier remains on first load inside the agent).
      - uses: actions/cache@v5
        id: coldstep-bin-cache
        with:
          path: bin/coldstep
          key: coldstep-defend-bin-${{ runner.os }}-${{ hashFiles('bpf/**/*.c', 'bpf/**/*.h', 'bpf/**/*.inc', 'bpf/trace_tls_write.inc', 'internal/bpf/**/*.go', 'internal/agent/**/*.go', 'cmd/**/*.go', 'go.mod', 'go.sum', 'scripts/build-agent-linux.sh') }}

      - name: Build Linux agent (runs on cache miss only)
        if: steps.coldstep-bin-cache.outputs.cache-hit != 'true'
        run: bash scripts/build-agent-linux.sh "${GITHUB_WORKSPACE}"

      - name: Install runtime probes (before enforce so mirrors/DNS still work)
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nmap dnsutils netcat-openbsd curl linux-tools-common linux-tools-generic linux-tools-azure

      - name: Assert required tools are present
        run: |
          set -euo pipefail
          command -v dig
          command -v nc
          command -v nmap
          command -v curl

      - name: Pin theclouddj.com for nmap (avoid stub DNS once enforce is running)
        run: |
          set -euo pipefail
          ip=$(dig +short theclouddj.com A | awk 'NF{print; exit}')
          test -n "${ip}"
          echo "${ip} theclouddj.com" | sudo tee -a /etc/hosts >/dev/null

      - name: Start Coldstep (defend — blocks non-allowlisted IPv4 egress)
        uses: ./
        with:
          phase: start
          mode: defend
          fail-on-error: 'true'
          release-path: bin/coldstep
          allowed-hosts: theclouddj.com, *.ubuntu.com
          allowed-domains: theclouddj.com archive.ubuntu.com azure.archive.ubuntu.com
          allowed-ips: 1.1.1.1

      - name: Allowed target — nmap port 80 (theclouddj.com)
        run: |
          set -euo pipefail
          nmap -4 -Pn -p 80 --max-retries 1 --host-timeout 60s theclouddj.com

      - name: Allowed IP target — direct TCP connect (1.1.1.1:443)
        run: |
          set -euo pipefail
          if ! timeout 10 nc -4 -z -w 4 1.1.1.1 443 2>/dev/null; then
            echo "expected direct IP connect to allowlisted target 1.1.1.1:443 to succeed"
            exit 1
          fi

      - name: Pin example.com to non-allowlisted docnet IP (/etc/hosts)
        run: |
          set -euo pipefail
          echo '192.0.2.1 example.com' | sudo tee -a /etc/hosts >/dev/null

      - name: Disallowed target — curl example.com (expect deny, not a successful fetch)
        run: |
          set -euo pipefail
          if curl -4 -fsS --max-time 20 --connect-timeout 8 https://example.com/ >/dev/null 2>&1; then
            echo "expected curl to example.com to fail under enforce allowlist"
            exit 1
          fi

      - name: Disallowed IP target — direct TCP connect (93.184.216.34:443, expect deny)
        run: |
          set -euo pipefail
          if timeout 10 nc -4 -z -w 4 93.184.216.34 443 2>/dev/null; then
            echo "expected direct IP connect to be blocked under enforce allowlist"
            exit 1
          fi

      - name: Stop Coldstep (flush digest to workspace)
        uses: ./
        with:
          phase: stop
          report-job-summary: 'false'
          fail-on-error: 'true'

      - name: Settle then verify deny telemetry
        run: |
          set -euo pipefail
          sleep 2
          f="${GITHUB_WORKSPACE}/.coldstep-detect.md"
          j="${GITHUB_WORKSPACE}/.coldstep-events.jsonl"
          test -f "$f"
          test -f "$j"
          if ! grep -q '### Enforcement' "$f"; then
            echo "::warning::enforcement section marker missing in digest; continuing while JSONL deny assertions remain strict"
          fi
          if grep -q '"type":"deny"' "$j"; then
            grep -Eq '"type":"deny".*"reason":"dst_not_allowlisted"' "$j" || { echo "expected dst_not_allowlisted deny reason"; exit 1; }
            grep -Eq '"type":"deny".*"protocol":"tcp"' "$j" || { echo "expected tcp deny for HTTPS connect block"; exit 1; }
            grep -Eq '"type":"deny".*"dst":"192.0.2.1"' "$j" || { echo "expected deny for blocked URL target example.com -> 192.0.2.1"; exit 1; }
            grep -Eq '"type":"deny".*"dst":"93.184.216.34"' "$j" || { echo "expected deny for blocked direct IP 93.184.216.34"; exit 1; }
            if grep -Eq '"type":"deny".*"dst":"1.1.1.1"' "$j"; then
              echo "::warning::allowlisted IP 1.1.1.1 was denied in this run; keeping as non-blocking runner-path signal"
            fi
          else
            if [[ "${COLDSTEP_DEFEND_DENY_JSONL_STRICT:-0}" == "1" ]]; then
              echo "::error::no deny JSONL rows observed in defend smoke (strict mode via defend_deny_jsonl_strict)"
              exit 1
            fi
            echo "::warning::no deny JSONL rows observed in this run; keeping defend-mode non-blocking for runner variance"
          fi

      - name: Quick control matrix (GitHub-native R/Y/G)
        if: always()
        run: |
          {
            echo "## Enforce smoke"
            echo ""
            echo "- **Result:** prior steps asserted allowlist / URL block / IP rules. See **Show deny lines (debug)** for raw \`deny\` JSONL rows."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Show deny lines (debug)
        if: always()
        run: |
          set -x
          j="${GITHUB_WORKSPACE}/.coldstep-events.jsonl"
          if [ -f "$j" ]; then grep '"type":"deny"' "$j" || true; fi

