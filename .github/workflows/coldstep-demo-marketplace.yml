# Minimal consumer-style workflow: published composite only (`coldstep-io/coldstep@TAG`), same ref as the
# [Marketplace listing](https://github.com/marketplace/actions/coldstep-ebpf-ci-egress). The agent is built
# from the action bundle unless you add `release-path`. Full integration / drift coverage stays on
# `coldstep-demo.yml` (`uses: ./`). After detect starts: optional built-in smoke probes plus explicit
# nc/curl/UDP probes for reliable digest/JSONL samples.

name: coldstep-demo-marketplace

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Minimal consumer workflow — no artifact download, no API writes, just
# checkout + run the published composite + print the result.
permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: coldstep-io/coldstep@v0.1.6
        with:
          mode: detect
          feature-gates: proc_tree=1,tls_sni=1,fs_events=1
          smoke-test-egress: 'true'

      - name: Install netcat (apt)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq netcat-openbsd

      - name: Egress probes (nc, curl, UDP)
        run: |
          set -euo pipefail
          printf 'GET / HTTP/1.0\r\n\r\n' | nc -w 8 example.com 80 | head -c 128 >/dev/null || true
          curl -4 -fsS --max-time 20 --connect-timeout 8 http://example.com/ >/dev/null || true
          curl -4 --http1.1 -fsS --max-time 20 --connect-timeout 8 https://example.com/ >/dev/null || true
          timeout 10 bash -c 'printf "x" >/dev/udp/8.8.8.8/53' 2>/dev/null || true
