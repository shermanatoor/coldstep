# PR / main / workflow_dispatch CI (v1): reusable runner workflow runs unit+integration on ubuntu-latest /
# Expensive checks (govulncheck, go test -shuffle, optional full-module race): coldstep-ci-nightly.yml (cron + manual).
# ubuntu-22.04 (x64) and ubuntu-24.04-arm / ubuntu-22.04-arm (arm64); detect/enforce remain ubuntu-latest x64.

name: coldstep-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      coldstep_diff_strict:
        description: Fail detect-mode if previous-run JSONL diff baseline is unavailable (hosted-linux job)
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

# Do not cancel in-flight runs: prevent-mode can spend 20+ minutes in BPF verifier/load before the
# composite action sees .coldstep-ready.json; a new push would cancel mid-wait and look like a timeout.
concurrency:
  group: coldstep-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hosted-linux:
    uses: ./.github/workflows/coldstep-ci-runner.yml
    with:
      coldstep_diff_strict: ${{ github.event_name != 'workflow_dispatch' || inputs.coldstep_diff_strict }}
    secrets: inherit
