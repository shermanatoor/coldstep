# Dev-branch detect demo: matches `coldstep-demo-detect.yml` reporting (report model, baseline diff rebuild,
# Tier-1 BLUF, rDNS, OTX, Tier-2 HTML artifact) plus `coldstep-report render-ip-summary` for the IP matrix in
# Job Summary (runs after OTX enrichment, before the BLUF pass, to reduce summary-size truncation risk). Triggers on
# `push` to `dev` and `workflow_dispatch` so changes can be exercised without `main`.
# Consumer pin (elsewhere): `uses: coldstep-io/coldstep@v0.2.0`
#
# Agent binary: download `coldstep-linux-amd64` from the repo GitHub Release for `COLDSTEP_AGENT_VERSION`
# (published by `supply-chain-attest.yml` on version tags). The action uses `release-path` and does not compile.

name: coldstep-detect-demo-dev

concurrency:
  group: coldstep-detect-demo-dev-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      coldstep_diff_strict:
        description: Fail job if previous-run JSONL diff cannot be computed
        type: boolean
        default: true
  push:
    branches:
      - dev

env:
  COLDSTEP_AGENT_VERSION: v0.2.0

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
    env:
      COLDSTEP_DIFF_PREV_RUN: "1"
      # Push runs have no workflow_dispatch inputs; default strict-on for baseline diff.
      COLDSTEP_DIFF_STRICT: ${{ github.event_name != 'workflow_dispatch' && '1' || (inputs.coldstep_diff_strict == true && '1' || '0') }}
      NS_RUNNER_LABEL: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build coldstep agent
        run: |
          bash public_scripts/build-agent-linux.sh "$GITHUB_WORKSPACE"
          mv bin/coldstep bin/coldstep-built
          chmod +x bin/coldstep-built
          # For release-path compatibility in next step
          cp bin/coldstep-built bin/coldstep

      - name: coldstep-io/coldstep (detect)
        uses: ./
        with:
          phase: start
          mode: detect
          log-level: info
          fail-on-error: 'false'
          report-job-summary: 'false'
          allowed-hosts: theclouddj.com, *.ubuntu.com
          feature-gates: proc_tree=1,tls_sni=1,fs_events=1
          release-path: bin/coldstep

      - name: Install runtime probes
        run: |
          set -euo pipefail
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq nmap dnsutils netcat-openbsd curl linux-tools-common linux-tools-generic linux-tools-azure

      - name: Assert required tools are present
        run: |
          set -euo pipefail
          command -v dig
          command -v nc
          command -v nmap
          command -v curl

      - name: Capability probes (detect mode)
        run: |
          set -euo pipefail
          # TCP (nmap); -4 so connects are IPv4 (JSONL only records IPv4 TCP).
          nmap -4 -Pn -p 80 --max-retries 1 --host-timeout 60s theclouddj.com
          # HTTP cleartext
          curl -4 -fsS --max-time 20 --connect-timeout 8 http://theclouddj.com/ >/dev/null || true
          # TLS ClientHello/SNI (force HTTP/1.1 to avoid QUIC bypassing TCP write sniff)
          curl -4 --http1.1 -fsS --max-time 20 --connect-timeout 8 https://theclouddj.com/ >/dev/null || true
          # UDP sendto evidence
          timeout 10 bash -c 'printf "x" >/dev/udp/8.8.8.8/53' 2>/dev/null || true
          # Process activity (proc_tree feature gate)
          bash -c 'echo "coldstep-demo" >/dev/null'
          # BPF Audit (if supported)
          sudo bpftool map show >/dev/null 2>&1 || true
          # Filesystem events: create -> rename -> chmod -> unlink
          TMP_FS_DIR="$(mktemp -d /tmp/coldstep-nmap-demo-XXXXXX)"
          TMP_A="${TMP_FS_DIR}/a.txt"
          TMP_B="${TMP_FS_DIR}/b.txt"
          printf 'demo\n' > "${TMP_A}"
          mv "${TMP_A}" "${TMP_B}"
          chmod 600 "${TMP_B}"
          rm -f "${TMP_B}" || true
          rmdir "${TMP_FS_DIR}" || true

      - name: Stop Coldstep (flush digest)
        uses: ./
        with:
          phase: stop
          report-job-summary: 'false'
          fail-on-error: 'false'

      - name: Verify detect capabilities
        run: |
          set -euo pipefail
          f="${GITHUB_WORKSPACE}/.coldstep-detect.md"
          j="${GITHUB_WORKSPACE}/.coldstep-events.jsonl"
          test -f "$f"
          test -f "$j"
          grep -q '"type":"meta"' "$j" || { echo "expected meta JSONL"; exit 1; }
          grep -q '"type":"exec"' "$j" || { echo "expected exec JSONL"; exit 1; }
          grep -q '"type":"tcp"' "$j" || { echo "expected tcp JSONL"; exit 1; }
          grep -q '"type":"udp"' "$j" || { echo "expected udp JSONL"; exit 1; }
          grep -q '"type":"http"' "$j" || { echo "expected http JSONL"; exit 1; }
          if ! grep -q '"type":"tls"' "$j"; then
            echo "::warning::tls JSONL not observed on this runner (best-effort signal with tls_sni gate)"
          fi
          if ! grep -q '"type":"proc_fork"' "$j"; then
            echo "::warning::proc_fork JSONL not observed on this runner (best-effort signal with proc_tree gate)"
          fi
          if ! grep -q '"type":"fs_event"' "$j"; then
            echo "::warning::fs_event JSONL not observed on this runner (best-effort signal with fs_events gate)"
          fi
          if ! grep -Eq '"type":"fs_event".*"op":"create"' "$j"; then
            echo "::warning::fs_event create not observed on this runner (best-effort signal on ubuntu-latest)"
          fi
          if ! grep -Eq '"type":"fs_event".*"op":"unlink"' "$j"; then
            echo "::warning::fs_event unlink not observed in this run (best-effort signal on ubuntu-latest)"
          fi
          if ! grep -Eq '"type":"fs_event".*"op":"rename"' "$j"; then
            echo "::warning::fs_event rename not observed in this run (best-effort signal on ubuntu-latest)"
          fi
          if ! grep -Eq '"type":"fs_event".*"op":"chmod"' "$j"; then
            echo "::warning::fs_event chmod not observed in this run (best-effort signal on ubuntu-latest)"
          fi
          if ! grep -q 'TLS ClientHello' "$f"; then
            echo "::warning::TLS ClientHello section not observed in digest on this runner"
          fi
          if ! grep -q 'HTTP/1 cleartext' "$f"; then
            echo "::warning::HTTP cleartext section not observed in digest on this runner"
          fi
          if ! grep -q 'UDP sendto' "$f"; then
            echo "::warning::UDP sendto section not observed in digest on this runner"
          fi
          if ! grep -qi 'process tree' "$f"; then
            echo "::warning::process tree section not observed in digest on this runner"
          fi
          if ! grep -qi 'Filesystem' "$f"; then
            echo "::warning::Filesystem section not observed in digest on this runner"
          fi

      # Tier-1 BLUF runs AFTER rDNS + OTX enrich so OTX headlines are accurate; full charts/tables stay Tier-2 HTML.
      - name: Build report model
        env:
          COLDSTEP_REPORT_CURRENT_JSONL: ${{ github.workspace }}/.coldstep-events.jsonl
          COLDSTEP_REPORT_MODEL_OUT: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report build-model

      - name: Compare detect output with previous successful run (opt-in)
        if: env.COLDSTEP_DIFF_PREV_RUN == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          summary="${GITHUB_STEP_SUMMARY}"
          current_file="${GITHUB_WORKSPACE}/.coldstep-events.jsonl"
          marker_prefix="coldstep-prev-diff"
          fail_diff_unavailable() {
            local reason="$1"
            echo "- ${marker_prefix}.result=unavailable (${reason})" >> "${summary}"
            if [[ "${COLDSTEP_DIFF_STRICT:-0}" == "1" ]]; then
              echo "::error::${reason}"
              exit 1
            fi
            exit 0
          }

          if [[ ! -f "${current_file}" ]]; then
            fail_diff_unavailable "current JSONL missing"
          fi

          current_run="${GITHUB_RUN_ID}"
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          workflow_file="$(basename "${GITHUB_WORKFLOW_REF%@*}")"
          baseline_run="$(
            gh run list --workflow "${workflow_file}" --branch "${branch}" --status success --limit 30 --json databaseId \
              --jq '[.[] | select((.databaseId|tostring) != "'"${current_run}"'")] | first | if . == null then empty else .databaseId|tostring end'
          )"
          fallback_used="false"

          if [[ -z "${baseline_run}" ]]; then
            baseline_run="$(
              gh run list --branch "${branch}" --status success --limit 30 --json databaseId \
                --jq '[.[] | select((.databaseId|tostring) != "'"${current_run}"'")] | first | if . == null then empty else .databaseId|tostring end'
            )"
            fallback_used="true"
          fi

          if [[ -z "${baseline_run}" ]]; then
            echo "- ${marker_prefix}.fallback_used=${fallback_used}" >> "${summary}"
            fail_diff_unavailable "no prior successful run found"
          fi

          echo "::notice::coldstep-prev-diff baseline_run=${baseline_run} fallback_used=${fallback_used}"

          rm -rf prev-state
          mkdir -p prev-state
          baseline_artifact="coldstep-events-baseline-${NS_RUNNER_LABEL}"
          if ! gh run download "${baseline_run}" --name "${baseline_artifact}" --dir prev-state >/dev/null 2>&1; then
            fail_diff_unavailable "baseline artifact missing for run ${baseline_run}"
          fi

          baseline_file="prev-state/.coldstep-events.jsonl"
          if [[ ! -f "${baseline_file}" ]]; then
            fail_diff_unavailable "downloaded artifact missing .coldstep-events.jsonl"
          fi

          if ! ./bin/coldstep-report diff --summary "${summary}" --baseline "${baseline_file}" --current "${current_file}" --marker "${marker_prefix}"; then
            fail_diff_unavailable "coldstep-report diff failed"
          fi

          # Re-build the report model with baseline JSONL so diff + downstream HTML carry traffic_new/gone/changed.
          ./bin/coldstep-report build-model --current "${current_file}" --baseline "${baseline_file}" --out "${GITHUB_WORKSPACE}/.coldstep-report-model.json"

      - name: Render step summary (markdown + mermaid)
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: ./bin/coldstep-report render-summary

      # rDNS enrichment runs before summary render so each deduped IP row can
      # include reverse lookup context when available.
      - name: Enrich report model with reverse DNS
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_RDNS_WALL_BUDGET_MS: '5000'
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report rdns-enrich --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping rDNS enrichment"
          fi

      # OTX enrichment runs AFTER the diff step's model rebuild (when present) and AFTER rDNS.
      - name: Enrich report model with OTX threat-intel
        if: always()
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_OTX_WALL_BUDGET_MS: '30000'
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report otx-enrich --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping OTX enrichment"
          fi

      # Append before BLUF so the IP matrix is less likely to be truncated when the
      # GitHub Job Summary approaches its size limit (last appends drop first).
      - name: Render IP classification summary
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report render-ip-summary --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping IP classification summary"
          fi

      - name: Render step summary (BLUF)
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report render-summary --in "${COLDSTEP_REPORT_MODEL_IN}"
          else
            echo "::warning::report model missing, skipping step summary render"
          fi

      - name: Render self-contained HTML report
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
          COLDSTEP_REPORT_HTML_OUT: ${{ github.workspace }}/coldstep-detect-report.html
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            ./bin/coldstep-report render-html --in "${COLDSTEP_REPORT_MODEL_IN}" --out "${COLDSTEP_REPORT_HTML_OUT}"
          else
            echo "::warning::report model missing, skipping HTML render"
          fi

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coldstep-detect-report-html-${{ env.NS_RUNNER_LABEL }}
          path: ${{ github.workspace }}/coldstep-detect-report.html
          retention-days: 14
          if-no-files-found: ignore
          overwrite: true

      - name: Verify IP classification summary output
        if: always()
        env:
          COLDSTEP_REPORT_MODEL_IN: ${{ github.workspace }}/.coldstep-report-model.json
        run: |
          set -euo pipefail
          if [[ -f "${COLDSTEP_REPORT_MODEL_IN}" ]]; then
            if ! grep -q "IP Classification Summary" "${GITHUB_STEP_SUMMARY}"; then
              echo "::warning::IP classification summary was not rendered into GITHUB_STEP_SUMMARY"
            fi
          else
            echo "::warning::report model missing, skipping IP classification summary verification"
          fi

      - name: Persist detect JSONL baseline artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coldstep-events-baseline-${{ env.NS_RUNNER_LABEL }}
          path: ${{ github.workspace }}/.coldstep-events.jsonl
          retention-days: 14
          include-hidden-files: true
          overwrite: true

      - name: List workspace outputs
        if: always()
        run: |
          set -euo pipefail
          ls -la "${GITHUB_WORKSPACE}"/.coldstep-detect.md "${GITHUB_WORKSPACE}"/.coldstep-events.jsonl 2>/dev/null || true
